---
# Project-level pre-commit configuration.
# Excludes certificate/key files in certs/ from private key detection.

default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: local
    hooks:
      - id: detect-private-key
        name: detect private key
        entry: detect-private-key
        language: system
        types: [text]
        exclude: ^certs/

      - id: trailing-whitespace
        name: trim trailing whitespace
        entry: trailing-whitespace-fixer
        language: system
        types: [text]
        exclude: ^certs/
